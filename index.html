<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generador de Perfiles — Universal Assistance</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f2f5;color:#222}
.app{display:flex;height:100vh;min-height:600px}
.sidebar{width:360px;min-width:360px;background:#fff;border-right:1px solid #e2e8f0;overflow-y:auto;display:flex;flex-direction:column}
.sidebar-header{padding:16px 20px;border-bottom:1px solid #e2e8f0;background:#0B1F3A}
.section{padding:14px 20px;border-bottom:1px solid #e2e8f0}
.section-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:#64748b;margin-bottom:10px}
label{font-size:12px;color:#64748b;display:block;margin-bottom:4px}
input[type=text],textarea,select{width:100%;font-size:13px;padding:7px 10px;border:1px solid #cbd5e1;border-radius:6px;background:#f8fafc;color:#1e293b;outline:none;font-family:inherit}
input[type=text]:focus,textarea:focus,select:focus{border-color:#E8196E;box-shadow:0 0 0 2px rgba(232,25,110,.12);background:#fff}
textarea{resize:vertical;min-height:52px}
.tabs{display:flex;gap:4px;margin-bottom:12px}
.tab{flex:1;padding:6px 8px;text-align:center;font-size:12px;font-weight:500;cursor:pointer;border:1px solid #cbd5e1;border-radius:6px;background:transparent;color:#64748b;transition:all .15s;font-family:inherit}
.tab.active{background:#0B1F3A;color:white;border-color:#0B1F3A}
.tab:hover:not(.active){background:#f1f5f9}
.col-headers{display:flex;gap:6px;margin-bottom:6px}
.col-headers span{font-size:11px;color:#94a3b8;font-weight:500}
.coverage-row{display:flex;gap:6px;align-items:flex-start;margin-bottom:6px}
.coverage-row input{font-size:12px;padding:6px 8px}
.coverage-row .cov-name{flex:2}
.coverage-row .cov-val{flex:1}
.del-btn{width:28px;min-width:28px;height:30px;display:flex;align-items:center;justify-content:center;background:none;border:none;cursor:pointer;color:#94a3b8;border-radius:4px;font-size:18px;padding:0;line-height:1;transition:color .15s,background .15s;font-family:inherit}
.del-btn:hover{color:#c0392b;background:rgba(192,57,43,.08)}
.add-btn{display:flex;align-items:center;gap:6px;font-size:12px;color:#E8196E;cursor:pointer;background:none;border:none;padding:6px 0;font-weight:500;font-family:inherit}
.add-btn:hover{opacity:.8}
.generate-btn{margin:16px 20px;width:calc(100% - 40px);background:#E8196E;color:white;border:none;border-radius:8px;padding:12px;font-size:13px;font-weight:600;cursor:pointer;letter-spacing:.3px;transition:background .15s,transform .1s;font-family:inherit}
.generate-btn:hover{background:#c4145b}
.generate-btn:active{transform:scale(.98)}
.preview-area{flex:1;padding:24px;overflow-y:auto;display:flex;flex-direction:column;align-items:center;background:#f0f2f5}
.preview-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:#94a3b8;margin-bottom:12px;align-self:flex-start}
.pdf-page-wrap{transform-origin:top center;transform:scale(0.75);margin-bottom:calc((842px * 0.75) - 842px)}
.pdf-page{background:white;width:595px;min-height:842px;box-shadow:0 2px 20px rgba(0,0,0,.15);border-radius:4px;overflow:hidden;font-family:'Helvetica Neue',Arial,sans-serif;color:#222}
.pdf-header{background:#0B1F3A;padding:16px 28px;display:flex;align-items:center;gap:14px}
.pdf-logo{display:flex;align-items:center}
.pdf-product-title{color:white;font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;margin-left:auto;opacity:.85}
.pdf-plan-badges{display:flex;gap:8px;margin-left:auto}
.pdf-plan-badge{background:rgba(255,255,255,.15);color:white;font-size:10px;font-weight:600;padding:3px 10px;border-radius:20px;letter-spacing:.5px}
.pdf-body{padding:20px 28px 24px}
.pdf-table-wrapper{border:1.5px solid #1a2f4e;border-radius:10px;overflow:hidden;margin-bottom:14px}
.pdf-table-head{background:#0B1F3A;padding:12px 18px}
.pdf-table-head h2{color:white;font-size:13px;font-weight:700;letter-spacing:.5px}
.pdf-col-headers{display:flex;background:#1a3558;padding:6px 18px;gap:8px}
.pdf-col-header-name{flex:1.2;font-size:9px;color:rgba(255,255,255,.6);font-weight:500}
.pdf-col-header-val{flex:1;text-align:right;font-size:9px;color:rgba(255,255,255,.9);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.pdf-col-header-val-c{flex:1;text-align:center;font-size:7px;color:rgba(255,255,255,.9);font-weight:700;letter-spacing:.1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.pdf-cov-row{display:flex;align-items:center;padding:7px 18px;gap:8px;border-bottom:.5px solid #e8edf2;font-size:11.5px}
.pdf-cov-row:last-child{border-bottom:none}
.pdf-cov-row:nth-child(odd){background:#f7f9fc}
.pdf-cov-row:nth-child(even){background:white}
.pdf-cov-name{flex:1.2;color:#333;min-width:0}
.pdf-cov-val{flex:1;text-align:right;font-weight:700;color:#0B1F3A;font-size:10px;white-space:nowrap}
.pdf-cov-val-multi{flex:1;text-align:center;font-weight:700;color:#0B1F3A;font-size:10px;white-space:nowrap}
.pdf-footnote{font-size:9.5px;color:#666;margin-bottom:12px;line-height:1.5;padding:0 2px}
.pdf-icons-row{display:flex;gap:10px;margin-bottom:12px}
.pdf-icon-card{flex:1;border:1px solid #e2e8f0;border-radius:8px;padding:10px 12px;display:flex;align-items:flex-start;gap:10px}
.pdf-icon-circle{width:30px;height:30px;min-width:30px;border-radius:50%;background:#e8f0f9;display:flex;align-items:center;justify-content:center;font-size:14px}
.pdf-icon-label{font-size:9.5px;font-weight:700;color:#0B1F3A;line-height:1.3}
.pdf-icon-sub{font-size:8.5px;color:#666;line-height:1.4;margin-top:2px}
.pdf-banner{background:#E8196E;border-radius:6px;padding:11px 18px;text-align:center;font-size:10.5px;font-weight:700;color:white;letter-spacing:.2px;line-height:1.4}
.feat-row{display:flex;gap:8px;align-items:flex-start;margin-bottom:8px}
.feat-row input{flex:1}
.feat-icon-sel{width:38px;min-width:38px;height:30px;text-align:center;font-size:14px;border:1px solid #cbd5e1;border-radius:6px;background:#f8fafc;cursor:pointer;font-family:inherit}
</style>
</head>

function escH(s){return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function setPlans(n){
  numPlans=n;
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===n-1));
  buildPlanNames();buildCoverageRows();render();
}
function buildPlanNames(){
  const w=document.getElementById('planNamesWrap');
  let h='<div style="display:flex;gap:6px;margin-top:6px">';
  for(let i=0;i<numPlans;i++)h+=`<div style="flex:1"><label>Plan ${i+1}</label><input type="text" value="${escH(planNames[i]||'Plan '+(i+1))}" oninput="planNames[${i}]=this.value;render()" style="font-size:12px"></div>`;
  h+='</div>';w.innerHTML=h;
}
function buildCoverageRows(){
  const list=document.getElementById('coverageList');
  const hdr=document.getElementById('colHeaders');
  let hh='<span style="flex:2">Cobertura</span>';
  for(let i=0;i<numPlans;i++)hh+=`<span style="flex:1;text-align:right">${numPlans>1?'Plan '+(i+1):'Valor'}</span>`;
  hh+='<span style="width:28px"></span>';hdr.innerHTML=hh;
  let h='';
  coverages.forEach((c,ci)=>{
    h+=`<div class="coverage-row"><input class="cov-name" type="text" value="${escH(c.name)}" oninput="coverages[${ci}].name=this.value;render()">`;
    for(let i=0;i<numPlans;i++)h+=`<input class="cov-val" type="text" value="${escH(c.vals[i]||'')}" placeholder="valor" oninput="coverages[${ci}].vals[${i}]=this.value;render()">`;
    h+=`<button class="del-btn" onclick="removeCoverage(${ci})">×</button></div>`;
  });
  list.innerHTML=h;
}
function buildFeatureRows(){
  const list=document.getElementById('featuresList');
  let h='';
  features.forEach((f,fi)=>{
    h+=`<div class="feat-row"><div style="flex:1;display:flex;flex-direction:column;gap:4px"><input type="text" value="${escH(f.label)}" placeholder="Título" oninput="features[${fi}].label=this.value;render()" style="font-size:12px"><input type="text" value="${escH(f.sub)}" placeholder="Subtítulo" oninput="features[${fi}].sub=this.value;render()" style="font-size:12px"></div><button class="del-btn" onclick="removeFeature(${fi})">×</button></div>`;
  });
  list.innerHTML=h;
}
function addCoverage(){coverages.push({name:'Nueva cobertura',vals:['','','','','','']});buildCoverageRows();render();}
function removeCoverage(i){coverages.splice(i,1);buildCoverageRows();render();}
function addFeature(){features.push({icon:'🛡️',label:'Título',sub:'Descripción'});buildFeatureRows();render();}
function removeFeature(i){features.splice(i,1);buildFeatureRows();render();}

function render(){
  const name=planNames[0]||'';
  const footnote=document.getElementById('footnote').value;
  const banner=document.getElementById('banner').value;
  let colHdr='<span class="pdf-col-header-name"></span>';
  if(numPlans===1)colHdr+='<span class="pdf-col-header-val">Cobertura</span>';
  else for(let i=0;i<numPlans;i++)colHdr+=`<span class="pdf-col-header-val-c">${escH(planNames[i]||'Plan '+(i+1))}</span>`;
  let badges='';
  for(let i=0;i<numPlans;i++)badges+=`<span class="pdf-plan-badge">${escH(planNames[i]||'Plan '+(i+1))}</span>`;
  let rows=coverages.map(c=>{
    let v=numPlans===1?`<span class="pdf-cov-val">${escH(c.vals[0]||'—')}</span>`:Array.from({length:numPlans},(_,i)=>`<span class="pdf-cov-val-multi">${escH(c.vals[i]||'—')}</span>`).join('');
    return `<div class="pdf-cov-row"><span class="pdf-cov-name">${escH(c.name)}</span>${v}</div>`;
  }).join('');
  let icons=features.map(f=>`<div class="pdf-icon-card"><div><div class="pdf-icon-label">${escH(f.label)}</div><div class="pdf-icon-sub">${escH(f.sub)}</div></div></div>`).join('');
  document.getElementById('pdfPreview').innerHTML=`
    <div class="pdf-header">
      <div class="pdf-logo"><img src="${LOGO_DATA}" style="height:36px;width:auto;display:block;mix-blend-mode:screen" alt="UA"></div>
      <div class="pdf-plan-badges">${badges}</div>
    </div>
    <div class="pdf-body">
      <div class="pdf-table-wrapper">
        <div class="pdf-table-head"><h2>COBERTURAS</h2></div>
        <div class="pdf-col-headers">${colHdr}</div>
        ${rows}
      </div>
      <div class="pdf-footnote">${escH(footnote)}</div>
      ${icons?`<div class="pdf-icons-row">${icons}</div>`:''}
      <div class="pdf-banner">${escH(banner)}</div>
    </div>`;
}

function drawHeader(doc, name, W, margin){
  doc.setFillColor(11,31,58);
  doc.rect(0,0,W,62,'F');
  // Use canvas to strip black from logo for PDF
  const canvas = document.createElement('canvas');
  const tmpImg = new Image();
  tmpImg.src = LOGO_DATA;
  const natW = tmpImg.naturalWidth || 600;
  const natH = tmpImg.naturalHeight || 240;
  canvas.width = natW;
  canvas.height = natH;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(tmpImg, 0, 0);
  const imgData = ctx.getImageData(0,0,canvas.width,canvas.height);
  const d = imgData.data;
  for(let i=0;i<d.length;i+=4){
    const brightness=(d[i]+d[i+1]+d[i+2])/3;
    if(brightness<60) d[i+3]=0;
  }
  ctx.putImageData(imgData,0,0);
  const cleanLogo = canvas.toDataURL('image/png');
  const logoH = 46;
  const logoW = (natW / natH) * logoH;
  doc.addImage(cleanLogo,'PNG',margin+2,8,logoW,logoH);

}

function drawTableHeader(doc, y, W, margin){
  doc.setFillColor(11,31,58);
  doc.roundedRect(margin,y,W-margin*2,28,6,6,'F');
  doc.setFontSize(11);doc.setFont('helvetica','bold');doc.setTextColor(255,255,255);
  doc.text('COBERTURAS',margin+14,y+18);
  if(true){
    let bx=W-margin-12;
    for(let i=numPlans-1;i>=0;i--){
      const label=planNames[i]||'Plan '+(i+1);
      const tw=doc.getTextWidth(label)+18;
      bx-=tw;
      doc.setFillColor(40,70,120);
      doc.roundedRect(bx,y+6,tw,16,3,3,'F');
      doc.setFontSize(7.5);doc.setFont('helvetica','bold');doc.setTextColor(255,255,255);
      doc.text(label,bx+tw/2,y+17,{align:'center'});
      bx-=5;
    }
  }
  return y+28;
}

function drawSubHeader(doc, y, W, margin){
  const tableW = W-margin*2;
  const valColW = numPlans===1 ? 90 : 75*numPlans;
  const nameColW = tableW - valColW - 16;
  if(numPlans>1){
    doc.setFillColor(26,53,88);
    doc.rect(margin,y,tableW,17,'F');
    const colW = valColW/numPlans;
    for(let i=0;i<numPlans;i++){
      doc.setFontSize(7);doc.setFont('helvetica','bold');doc.setTextColor(200,220,240);
      doc.text(planNames[i]||'Plan '+(i+1), margin+8+nameColW+8+colW*i+colW/2, y+11.5, {align:'center'});
    }
    return y+17;
  } else {
    doc.setFillColor(26,53,88);
    doc.rect(margin,y,tableW,15,'F');
    doc.setFontSize(7);doc.setFont('helvetica','bold');doc.setTextColor(190,210,235);
    doc.text('COBERTURA', W-margin-10, y+10.5, {align:'right'});
    return y+15;
  }
}

function downloadPDF(){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'portrait',unit:'pt',format:'a4'});
  const name=planNames[0]||'perfil-cobertura';
  const footnote=document.getElementById('footnote').value;
  const banner=document.getElementById('banner').value;
  const W=595, margin=28, H=841, bottomReserve=110;
  let y=0;

  drawHeader(doc,name,W,margin);
  y=76;
  let tableTopY=y;
  y=drawTableHeader(doc,y,W,margin);
  y=drawSubHeader(doc,y,W,margin);
  let tableOpenY=tableTopY+2;

  coverages.forEach((c,ci)=>{
    // Fixed column widths to prevent overlap
    const tableW = W - margin*2;
    const valColW = numPlans===1 ? 90 : Math.min(75*numPlans, W-margin*2-120);
    const nameColW = tableW - valColW - 16;

    doc.setFontSize(8); doc.setFont('helvetica','normal');
    const nameLines = doc.splitTextToSize(c.name, nameColW);
    const rowH = Math.max(15, nameLines.length * 11 + 6);

    // Check again with actual row height
    if(y + rowH > H - bottomReserve){
      doc.setDrawColor(11,31,58);doc.setLineWidth(1.5);
      doc.roundedRect(margin,tableOpenY,W-margin*2,y-tableOpenY,6,6);
      doc.addPage();
      drawHeader(doc,name,W,margin);
      y=76; tableTopY=y;
      y=drawTableHeader(doc,y,W,margin);
      y=drawSubHeader(doc,y,W,margin);
      tableOpenY=tableTopY+2;
    }

    const isOdd=ci%2===0;
    doc.setFillColor(isOdd?247:255,isOdd?249:255,isOdd?252:255);
    doc.rect(margin,y,W-margin*2,rowH,'F');
    doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(50,50,50);
    const textY = y + (rowH/2) - ((nameLines.length-1)*5.5) + 3;
    doc.text(nameLines, margin+8, textY);

    if(numPlans===1){
      doc.setFont('helvetica','bold');doc.setTextColor(11,31,58);
      doc.text(c.vals[0]||'—', W-margin-8, y+rowH/2+3, {align:'right'});
    } else {
      const colW=(tableW - nameColW - 16)/numPlans;
      for(let i=0;i<numPlans;i++){
        doc.setFont('helvetica','bold');doc.setTextColor(11,31,58);
        doc.text(c.vals[i]||'—', margin+8+nameColW+8+colW*i+colW/2, y+rowH/2+3, {align:'center'});
      }
    }
    doc.setDrawColor(215,225,238);doc.setLineWidth(0.3);
    doc.line(margin,y+rowH,W-margin,y+rowH);
    y+=rowH;
  });

  // Close table
  doc.setDrawColor(11,31,58);doc.setLineWidth(1.5);
  doc.roundedRect(margin,tableOpenY,W-margin*2,y-tableOpenY,6,6);
  y+=10;

  // Footer block: footnote + features + banner
  const fnLines=doc.splitTextToSize(footnote,W-margin*2);
  const fnH=fnLines.length*9+10;
  const featH=features.length>0?52:0;
  const bannerH=32;
  const footerTotal=fnH+featH+bannerH;

  if(y+footerTotal > H-20){
    doc.addPage();
    drawHeader(doc,name,W,margin);
    y=76;
  }

  doc.setFontSize(7.5);doc.setFont('helvetica','normal');doc.setTextColor(100,100,100);
  doc.text(fnLines,margin,y);
  y+=fnH;

  if(features.length>0){
    const featW=(W-margin*2-8*(features.length-1))/features.length;
    features.forEach((f,i)=>{
      const fx=margin+i*(featW+8);
      doc.setFillColor(245,248,252);doc.setDrawColor(215,225,238);doc.setLineWidth(0.5);
      doc.roundedRect(fx,y,featW,38,5,5,'FD');
      doc.setFontSize(8.5);doc.setFont('helvetica','bold');doc.setTextColor(11,31,58);
      const ll=doc.splitTextToSize(f.label,featW-16);
      doc.text(ll,fx+8,y+12);
      doc.setFontSize(7);doc.setFont('helvetica','normal');doc.setTextColor(90,90,90);
      const sl=doc.splitTextToSize(f.sub,featW-16);
      doc.text(sl,fx+8,y+12+(ll.length*9));
    });
    y+=48;
  }

  doc.setFillColor(232,25,110);
  doc.roundedRect(margin,y,W-margin*2,26,5,5,'F');
  doc.setFontSize(8.5);doc.setFont('helvetica','bold');doc.setTextColor(255,255,255);
  const bl=doc.splitTextToSize(banner,W-margin*2-20);
  doc.text(bl,W/2,y+10+(bl.length===1?4:0),{align:'center'});

  doc.save('UA Perfiles.pdf');
}

buildPlanNames();buildCoverageRows();buildFeatureRows();render();
</script>
